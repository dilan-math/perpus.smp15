<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Tamu Perpustakaan SMPN 15 Banjarbaru</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:900px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.25);
border-radius:25px;
padding:30px;
color:white;
box-shadow:0 20px 60px rgba(0,0,0,.3);
position:relative;
}

.header{
text-align:center;
margin-bottom:20px;
position:relative;
}

.header img{
width:90px;
height:90px;
border-radius:50%;
background:#fff;
padding:5px;
object-fit:cover;
}

.header h1{
margin-top:10px;
font-size:24px;
}

.header p{
opacity:.9;
}

/* FULLSCREEN BUTTON */
#fullscreenBtn{
position:absolute;
top:10px;
right:10px;
padding:10px 14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.2);
color:white;
cursor:pointer;
font-weight:600;
backdrop-filter:blur(10px);
}

#fullscreenBtn:hover{
background:rgba(255,255,255,.3);
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin:20px 0;
}

.stat{
background:rgba(255,255,255,.15);
padding:15px;
border-radius:15px;
text-align:center;
font-weight:600;
}

label{
display:block;
margin-top:12px;
font-weight:500;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:12px;
outline:none;
font-size:14px;
}

textarea{
resize:none;
height:90px;
}

button.main{
width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
background:white;
color:#1e3a8a;
transition:.2s;
}

button.main:hover{
transform:scale(1.02);
}

button.main:disabled{
background:#cccccc;
color:#666666;
cursor:not-allowed;
transform:none;
}

.hidden{display:none;}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:white;
padding:25px;
border-radius:20px;
width:90%;
max-width:350px;
text-align:center;
}

.modal-box h2{
color:#1e3a8a;
margin-bottom:10px;
}

.modal-box p{
color:#444;
margin-bottom:15px;
}

.modal-box button{
background:#1e3a8a;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<button id="fullscreenBtn" onclick="toggleFullscreen()">⛶</button>

<img src="https://i.imgur.com/KOimaeF.jpeg">
<h1>Perpustakaan SMPN 15 Banjarbaru</h1>
<p>Buku Tamu Digital</p>
</div>

<div class="stats">
<div class="stat">Siswa<br><span id="siswaCount">0</span></div>
<div class="stat">Umum<br><span id="umumCount">0</span></div>
<div class="stat">Total<br><span id="totalCount">0</span></div>
</div>

<label>Jenis Pengunjung</label>
<select id="jenis" onchange="toggleForm()">
<option value="Siswa">Siswa</option>
<option value="Umum">Umum</option>
</select>

<div id="formSiswa">

<label>Kelas</label>
<select id="kelasSelect" onchange="isiNamaSiswa()">
<option value="">Memuat Kelas...</option>
</select>

<label>Nama Siswa</label>
<select id="namaSelect">
<option value="">Pilih Nama Siswa</option>
</select>

</div>

<div id="formUmum" class="hidden">

<label>Nama</label>
<input id="namaUmum">

<label>Instansi</label>
<input id="instansi">

</div>

<label>Keperluan</label>
<textarea id="keperluan"></textarea>

<button class="main" id="btnSimpan" onclick="simpan()">SIMPAN KUNJUNGAN</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h2>🎉 Berhasil!</h2>
<p id="modalText"></p>
<button onclick="closeModal()">OK</button>
</div>
</div>

<script>

// PERBAIKAN: Variabel dideklarasikan tanpa spasi agar tidak error
let dataSiswaGlobal = [];

/* KETIKA HALAMAN DI-LOAD */
window.onload = function() {
  loadDataSiswa();
  updateStatistik();
  toggleForm();
};

/* AMBIL DATA SISWA DARI SPREADSHEET */
function loadDataSiswa() {
  google.script.run
    .withSuccessHandler(function(data) {
      dataSiswaGlobal = data;
      
      const kelasSelect = document.getElementById("kelasSelect");
      kelasSelect.innerHTML = '<option value="">Pilih Kelas</option>';
      
      // Ambil list kelas unik dan urutkan
      const kelasList = [...new Set(data.map(s => s.kelas))].sort();
      
      kelasList.forEach(k => {
        if(k) kelasSelect.innerHTML += `<option>${k}</option>`;
      });
    })
    .withFailureHandler(function(err) {
      alert("Gagal memuat data siswa: " + err.message);
    })
    .getSiswa();
}

/* UPDATE COUNTER STATISTIK DARI SPREADSHEET */
function updateStatistik() {
  google.script.run
    .withSuccessHandler(function(stat) {
      document.getElementById("siswaCount").innerText = stat.siswa;
      document.getElementById("umumCount").innerText = stat.umum;
      document.getElementById("totalCount").innerText = stat.total;
    })
    .getStatistik();
}

/* FULLSCREEN */
function toggleFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
document.getElementById("fullscreenBtn").innerText="✕";
}else{
document.exitFullscreen();
document.getElementById("fullscreenBtn").innerText="⛶";
}
}

/* ISI DROPDOWN NAMA BERDASARKAN KELAS YANG DIPILIH */
function isiNamaSiswa(){
const kelasSelect = document.getElementById("kelasSelect");
const namaSelect = document.getElementById("namaSelect");
namaSelect.innerHTML = '<option value="">Pilih Nama Siswa</option>';

const kelas = kelasSelect.value;
dataSiswaGlobal.filter(s => s.kelas === kelas)
  .forEach(s => {
    namaSelect.innerHTML += `<option>${s.nama}</option>`;
  });
}

/* TOGGLE TAMPILAN FORM */
function toggleForm(){
let jenis=document.getElementById("jenis").value;
document.getElementById("formSiswa").style.display=jenis==="Siswa"?"block":"none";
document.getElementById("formUmum").style.display=jenis==="Siswa"?"none":"block";
}

/* SIMPAN DATA KE GOOGLE SHEETS */
function simpan(){
const btnSimpan = document.getElementById("btnSimpan");
let jenis = document.getElementById("jenis").value;
let item;

if(jenis === "Siswa"){
  const kelasSelect = document.getElementById("kelasSelect");
  const namaSelect = document.getElementById("namaSelect");
  
  if(!kelasSelect.value || !namaSelect.value){
    alert("Lengkapi data siswa");
    return;
  }

  item = {
    jenis: jenis,
    nama: namaSelect.value,
    kelas: kelasSelect.value,
    keperluan: document.getElementById("keperluan").value
  };
} else {
  const namaUmum = document.getElementById("namaUmum").value.trim();
  if(!namaUmum) {
    alert("Nama pengunjung umum wajib diisi");
    return;
  }

  item = {
    jenis: jenis,
    nama: namaUmum,
    kelas: "-",
    keperluan: document.getElementById("keperluan").value
  };
}

// Ubah text tombol menjadi loading & nonaktifkan agar tidak double click
btnSimpan.innerText = "MENYIMPAN...";
btnSimpan.disabled = true;

// Kirim data ke fungsi simpanKunjungan() di Kode.gs
google.script.run
  .withSuccessHandler(function(response) {
    btnSimpan.innerText = "SIMPAN KUNJUNGAN";
    btnSimpan.disabled = false;
    
    updateStatistik(); // Segarkan jumlah statistik terbaru
    showModal(`Terima kasih, ${item.nama} 🙌`);
  })
  .withFailureHandler(function(err) {
    btnSimpan.innerText = "SIMPAN KUNJUNGAN";
    btnSimpan.disabled = false;
    alert("Gagal menyimpan data ke Spreadsheet: " + err.message);
  })
  .simpanKunjungan(item);
}

/* MODAL CONTROL */
function showModal(text){
document.getElementById("modalText").innerText=text;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";

/* RESET FORM */
document.getElementById("keperluan").value="";
document.getElementById("namaUmum").value="";
document.getElementById("instansi").value="";
document.getElementById("kelasSelect").selectedIndex=0;
document.getElementById("namaSelect").innerHTML='<option value="">Pilih Nama Siswa</option>';

document.getElementById("jenis").value="Siswa";
toggleForm();
}

</script>

</body>
</html>
